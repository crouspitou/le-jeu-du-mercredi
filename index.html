<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Le jeu du mercredi</title>
	
	    <!--Google Fonts and Icons-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Sharp|Material+Icons+Two+Tone"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Foldit:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

</head>

<style>




	body {
	    margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #013761;
		background: linear-gradient(135deg, rgba(1, 55, 97, 1) 0%, rgba(102, 173, 167, 1) 100%);
        min-height: 100vh;
	}
	
	.page {
		min-height: 100vh;
		display: flex;
		flex-direction: column;
	}
	
	.quiz {
		flex: 1;               /* prend tout l'espace disponible */
		display: flex;
		justify-content: center;
		align-items: center;
	}
	.card {
	    background: #F7F8FA;
        width: 75vw;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
	}
	
	footer {
		padding: 20px;
		text-align: center;
		color: white;
	}
	
	.card-reponse {
	    background: #D1E6E4;
        padding: 10px 20px;
        border-radius: 20px;
        text-align: center;
	}
	
	h1{
		color: #013761;
		margin-bottom: 30px;
	}
	
	label{
		display: block;
		color: #000E19;
		font-size: 20px;
		margin-bottom: 20px;
		
	}
	
	
	.btn-valider {
        display: block;
        margin: auto;
        padding: 12px 30px;
        font-size: 18px;
        background: #29A829;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-valider:hover {
        background: #208320;
        transform: scale(1.05);
    }
	
	#message {
        margin-top: 25px;
        font-size: 24px;
        font-weight: bold;
        color: #DC143C;
        min-height: 35px;
    }
	
	#message.bravo {
		color: #32CD32;
		margin-top: 25px;
        font-size: 24px;
        font-weight: bold;
        min-height: 35px;
	}
	
	#proposition {
        font-size: 18px;
        color: #013761;
		font-style: italic;
		font-weight: 100;
    }
	
	#nbTentatives {
		color: #667998;
	}

	
	.input-poids {
        height: 50px;
		margin-bottom: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
    }
	
	.btn-input{
        width: 50px;
        height: 50px;
        color: #F7F8FA;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
	}
	.btn-input span {
        font-size: 24px;
    }
	.btn-input-moins{
		background: #30A4FD;
		border-top-left-radius: 10px;
		border-bottom-left-radius: 10px;
	}
	.btn-input-plus{
		background: #0276CF;
		border-top-right-radius: 10px;
		border-bottom-right-radius: 10px;
	}
    .btn-input-moins:hover{
		background: #0390FC;
	}
	.btn-input-plus:hover{
		background: #025CA2;
	}
	.btn-input:active {
		position: relative;
		top: 1px;
		opacity: 0.75;
	}


	#affichage-input {
        flex-grow: 1;
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        flex-direction: column;
		background-color: white;

	}
	#affichage-input.erreur {
		border: solid 1px red;
		background-color: #ffe5e5;
	}
	
	#poids {
        font-size: 24px;
        font-weight: 600;
		color: #013761;
		outline: none;
		border: none;
		text-align: center;
		width: 6ch;
		background-color: transparent;
    }
	

	
		/* Chrome, Edge, Safari */
	input::-webkit-inner-spin-button,
	input::-webkit-outer-spin-button {
		-webkit-appearance: none;
		margin: 0;
	}

	/* Firefox */
	input[type="number"] {
		appearance: textfield;
	}
	
    .text-input {
        font-size: 12px;
        font-weight: 500;
		padding-bottom: 4px;
		color: #667998;
    }
	
	.cache {
		display: none;
	}
	
	#alerte {
		color: red;
		font-weight: bold;
	}
	

	
</style>

<body class="body">
	
	<div class="page">
	
		<div class="quiz">
			<div class="card">
			<h1>LE JEU DU MERCREDI</h1>
			<label for="poids">Combien pèse un Crouspitou ?</label>
			<!-- Input Number personnalisé -->
			<div class="input-poids">

				<button type="button" class="btn-input btn-input-moins" onclick="decrease()">
					<span class="material-icons-outlined">remove</span>
				</button>

				<div id="affichage-input" class="affichage-input">
					 <input
					type="number"
					id="poids"
					min="50"
					max="100"
					step="0.1"
					value="88.6">
					<span class="text-input">kg</span>
				</div>

				<button type="button" class="btn-input btn-input-plus" onclick="increase()">
					<span class="material-icons-outlined">add</span>
				</button>
			</div>
			
			<button onclick="comparerPoids()" class="btn-valider">Valider</button>
			
			<p id="nbTentatives"></p>
			
			<div class="card-reponse cache" id="card-reponse">
				<p id="proposition" >Ta proposition : <span id="valeurProposition"></span> kg</p>
				<p id="message"></p>
			</div>
			
			<p id="alerte"></p>

			</div>
		</div>
		
		
		<footer>
			<p>© 2026 - Le Jeu du Mercredi | 08/07/2026</p>
		</footer>
		
		
	</div>


	
	


    <script>
        const solution = 88.8;
		var nbTentatives = 0;
		
		const cardReponse = document.getElementById("card-reponse");
		const affichageInput = document.getElementById("affichage-input");
		const inputPoids = document.getElementById("poids");
		const alerte = document.getElementById("alerte");
		const message = document.getElementById("message");


        function comparerPoids() {
			const poids = inputPoids.valueAsNumber;
			
			const valeur = Number(inputPoids.value);
			const min = Number(inputPoids.min);
			const max = Number(inputPoids.max);

			if (valeur < min || valeur > max) {
				affichageInput.classList.add("erreur");
				cardReponse.classList.add("cache");
				alerte.textContent = "Le poids doit être compris entre 50 et 100 kg";
			} else {
				alerte.textContent = "";
				affichageInput.classList.remove("erreur");
				if (poids > solution) {
					cardReponse.classList.remove("cache");
					message.textContent = "👎 c'est moins !";	
				} else if (poids < solution) {
					cardReponse.classList.remove("cache");
					message.textContent = "👍 c'est plus !";
				} else {
					message.textContent = "🎉 BRAVO ! Tu as trouvé ! 🎉";
					message.classList.add("bravo");
				}
			
				document.getElementById("valeurProposition").textContent = poids;

				
				nbTentatives += 1;
				
				var texteCoup =" coup";
				if (nbTentatives > 1) {
					texteCoup = " coups"
				} else {
					textCoup = " coup"
				}
				document.getElementById("nbTentatives").textContent = nbTentatives + texteCoup;
			}
			
        }
		
		<!-- __________ Vérifie les valeurs autorisées ________ -->
		
		function verifierPoids() {

			const valeur = Number(inputPoids.value);
			const min = Number(inputPoids.min);
			const max = Number(inputPoids.max);

			if (valeur < min || valeur > max) {
				inputPoids.classList.add("erreur");
			} else {
				inputPoids.classList.remove("erreur");
			}
		}
		
		<!-- ________ Input Number personnalisé ________ -->
		const input = document.getElementById("poids");

		function increase() {

			let valeur = Number(input.value);

			if (valeur + 0.1 <= Number(input.max)) {
				input.value = (valeur + 0.1).toFixed(1);
			}

		}

		function decrease() {

			let valeur = Number(input.value);

			if (valeur - 0.1 >= Number(input.min)) {
				input.value = (valeur - 0.1).toFixed(1);
			}

		}

    </script>

</body>

</html>
